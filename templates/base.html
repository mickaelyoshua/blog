<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Yoshua{% endblock %}</title>
    <link
      rel="preload"
      href="/static/fonts/IBMPlexSans-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/static/css/style.css?v={{ layout.style_hash }}" />
  </head>
  <body>
    <a href="#content" class="skip-link">Pular para o conteúdo</a>

    <header class="site-header">
      <div class="container">
        <a href="/" class="logo">Yoshua</a>
        <nav class="site-nav" aria-label="Navegação principal">
          <a href="/"{% if layout.active_nav == "/" %} class="active"{% endif %}>Início</a>
          <a href="/blog"{% if layout.active_nav == "/blog" %} class="active"{% endif %}>Blog</a>
          <a href="/cv"{% if layout.active_nav == "/cv" %} class="active"{% endif %}>Currículo</a>
        </nav>
      </div>
    </header>

    <main id="content">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Yoshua. Todos os direitos reservados.</p>
      </div>
    </footer>
  </body>
</html>
