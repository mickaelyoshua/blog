name: audit

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    # Weekly Monday 06:00 UTC — catches advisories filed against pinned deps
    # even when no PR touches Cargo.lock.
    - cron: "0 6 * * 1"

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # RUSTSEC-2025-0141: bincode 1.x flagged unmaintained. Pulled in
      # transitively by syntect for its precompiled syntax dumps. Not a
      # vulnerability — drop this ignore once syntect publishes a release
      # on bincode 2.x.
      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2025-0141
